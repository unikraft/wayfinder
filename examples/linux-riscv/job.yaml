      image: localhost:5000/scratch:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: |
        set -xe
        ping -c 1 $WAYFINDER_DOMAIN_IP_ADDR
        if [ $? -eq 0 ]; then
          echo "1" > /result.txt
        else
          echo "0" > /result.txt
        fi
      cores: 1
      start_delay: 10
      duration: 30
      results:
      - name: boot
        path: /result.txt
        type: int
