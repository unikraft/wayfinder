build:
  image: localhost:5000/linux-riscv:latest
  outputs:
    kernel: /linux/arch/riscv/boot/Image
    disks:
      - name: vda
        type: raw
        path: /busybox.bin
  devices:
    - /dev/urandom
    - /dev/loop-control
  capabilities:
    - CAP_NET_ADMIN
    - CAP_SYS_ADMIN
  cores: 4
  workdir: /
  commands:
    |
    set -xe

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    env

    echo "Configuring kernel"

    cd /linux

    for var in $(env | grep ^CONFIG_ | cut -d= -f1); do
      if [ -n "${!var}" ]; then
        ./kconfig-set.sh .config ${var} ${!var}
      fi
    done

    make ARCH=riscv CROSS_COMPILE=riscv64-linux-gnu- olddefconfig

    echo "Building kernel"
    make ARCH=riscv CROSS_COMPILE=riscv64-linux-gnu- -j$(nproc)

    echo "Generating filesystem image"
    dd if=/dev/zero of=/busybox.bin bs=1M count=32
    mkfs.ext2 /busybox.bin
    mkdir -p /mnt
    mount -o loop /busybox.bin /mnt
    cp -rv /rootfs/* /mnt
    umount /mnt

    echo "Build Done!"

test:
