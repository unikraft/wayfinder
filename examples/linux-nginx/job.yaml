    type:    string
    default: "performance"
    only:    ["performance", "powersave", "userspace", "ondemand", "conservative"]
    when:    build

  - name:    CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE
    type:    string
    default: "y"
    only:    ["y"]
