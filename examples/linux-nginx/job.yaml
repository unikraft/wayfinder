    when:    build
    if:      TIMER_FREQUENCY=='hz_300'

  - name:    CONFIG_HZ_1000
    type:    string
    default: "y"
    only:    ["y"]
    when:    build
    if:      TIMER_FREQUENCY=='hz_1000'

  - name:    TIMER_TICK_HANDLING
    type:    string
    default: "no_hz_full"
    only:    ["hz_periodic", "no_hz_idle", "no_hz_full"]
    when:    build

  - name:    CONFIG_HZ_PERIODIC
    type:    string
    default: "y"
    only:    ["y"]
    when:    build
