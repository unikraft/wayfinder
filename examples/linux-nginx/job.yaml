  - name:    CONFIG_NO_HZ_IDLE
    type:    string
    default: "y"
    only:    ["y"]
    when:    build
    if:      TIMER_TICK_HANDLING=='no_hz_idle'

  - name:    CONFIG_NO_HZ_FULL
    type:    string
    default: "y"
    only:    ["y"]
    when:    build
    if:      TIMER_TICK_HANDLING=='no_hz_full'

