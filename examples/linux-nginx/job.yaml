  # /proc/sys/net/core
  - name:    BPF_JIT_ENABLE
    type:    string
    default: "0"
    only:    ["0", "1"]
    when:    test

  # these are high importance probably.
  - name:    BUSY_POLL
    type:    string
    default: "0"
    only:    ["0", "1"]
    when:    test

  - name:    BUSY_READ
    type:    string
    default: "0"
    only:    ["0", "1"]
    when:    test

  # This is only relevant if you perform some form of priority queueing.
  - name:    DEFAULT_QDISC
    type:    string
    default: "pfifo_fast"
    only:    ["pfifo", "bfifo", "pfifo_fast", "red", "sfq", "tbf"]
    when:    test

  #  maximum number of packets that kernel can handle on a NAPI interrupt
  - name:    DEV_WEIGHT
    type:    int
    default: 64
    only:    [64]
    when:    test

  # These option requires rps to be enabled on option
  # /sys/class/net/<dev>/queues/rx-<n>/rps_cpus also it doesn't make much sense
  # if single core (spreads interrupt management to multiple CPUs])
  # if testing multicre worth checking: XPS (Transmit packet steering),
  # RFS (Receive Flow Steering)
  - name:    FLOW_LIMIT_CPU_BITMAP
    type:    string
    default: "00"
    only:    ["00"]
    when:    test

  - name:    FLOW_LIMIT_TABLE_LEN
    type:    int
    default: 4096
    only:    [4096]
    when:    test

  # Logging infromation limits from the network. Probably should be turned off.
  - name:    MESSAGE_BURST
    type:    int
    default: 10
    only:    [10]
    when:    test

  - name:    MESSAGE_COST
    type:    int
    default: 5
    only:    [5]
    when:    test

  # threshold of packet processed on every NAPI poll cycle (Probably interesting,
  # although since backpressure will occur naturally, not that important)
  - name:    NETDEV_BUDGET
    type:    int
    default: 300
    only:    [300]
    when:    test

  # size of receive queue between netdev and ip kernel layers
  - name:    NETDEV_MAX_BACKLOG
    type:    int
    default: 1000
