params:
  # Linux-specific
  - name: CONFIG_NETWORK_SECMARK
    type: string
    only: ["y", "n"]
    when: build

  - name: CONFIG_CC_OPTIMIZE_FOR_SIZE
    type: string
    only: ["y", "n"]
    when: build

  - name: CONFIG_SECURITY_SELINUX
    type: string
    only: ["y", "n"]
    when: build

  - name: CONFIG_CPU_FREQ_STAT
    type: string
    only: ["y", "n"]
    when: build

  # Nginx-specific
  #- name: ACCESS_LOG
  #  type: string
  #  only: ["y", "n"]
  #  when: both
  #
  #- name: KEEPALIVE_TIMEOUT
  #  type: int
  #  only: [0, 30, 60, 300]
  #  when: test
  #
  #- name: OPEN_FILE_CACHE
  #  type: string
  #  only: ["caching", "nocaching"]
  #  when: test
  #
  # Client-specific
  #- name: WORKER_CONNECTIONS
  #  type: int
  #  only: [63]
  #  when: test
  #
  #- name: PAYLOAD_SIZE
  #  type: int
  #  only: [612] # bytes
  #  when: test
  #
  #- name: NUM_PARALLEL_CONNS
  #  type: int
  #  only: [5, 10, 30, 64]
  #  when: test

build:
  image: hlefeuvre/linux-nginx:latest
  outputs:
    kernel: /root/linux-nginx-qemu.kernel
    initrd: /root/nginx.ext2
    arch: x86_64
    plat: kvm
  devices:
    - /dev/urandom
  capabilities:
    - CAP_NET_ADMIN
  cores: 2
  commands:
    |
    set -ex
    env

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    # 1. Configure
    # Note: you can use my very neat /root/kconfig-set.sh utility, pass
    # the path to the kconfig file first ($MICROVM_CFG exported by the
    # dockerfile), then the name of the variable, e.g., NETWORK_SECMARK,
    # and then the value, e.g., y, n, 32, "somestring", etc.
    /root/kconfig-set.sh $MICROVM_CFG CONFIG_NETWORK_SECMARK $CONFIG_NETWORK_SECMARK
    /root/kconfig-set.sh $MICROVM_CFG CONFIG_CC_OPTIMIZE_FOR_SIZE $CONFIG_CC_OPTIMIZE_FOR_SIZE
    /root/kconfig-set.sh $MICROVM_CFG CONFIG_SECURITY_SELINUX $CONFIG_SECURITY_SELINUX
    /root/kconfig-set.sh $MICROVM_CFG CONFIG_CPU_FREQ_STAT $CONFIG_CPU_FREQ_STAT

    # 2. Build the image
    # Nothing to change here.
    pushd $LUPINE_DIR
    ./scripts/build-with-configs.sh nopatch $MICROVM_CFG $NGINX_CFG
    cp $LUPINE_DIR/kernelbuild/microvm++nginx/vmlinuz-4.0.0 \
          /root/linux-nginx-qemu.kernel
    popd

    # 3. Regenerate ext4 image
    # Necessary if you want to change options inside of the filesystem.
    mkdir -p /mnt/nginx-tmp
    mount -o loop /root/linux-nginx.ext2 /mnt/nginx-tmp

    # The filesystem is now mounted under /mnt/nginx-tmp, you can do any
    # changes you like, it will automatically be updated in
    # /root/linux-nginx.ext2.

    # 3.1. Modify values inside the configuration (for Nginx)
    # Nginx configuration is at /etc/nginx/nginx.conf
    # TODO

    # 3.2. Modify values inside the configuration (for Linux, dynamic
    # runtime variables)
    # TODO we need to clarify how to do that
 
    # 3.3. Cleanup the damn thing
    umount /mnt/nginx-tmp
    mkdir -p /mnt/nginx-tmp

    echo "Build Done!"

test:
  kernel:
    memory: 100M
    args: "root=/dev/vda rw console=ttyS0 init=/guest_start.sh -- $WAYFINDER_DOMAIN_IP_ADDR $WAYFINDER_DOMAIN_IP_GW_ADDR nginx"
    cores: 1
  benchtool:
    image: ghcr.io/unikraft/wayfinder/wrk:latest
    devices:
      - /dev/urandom
      - /dev/kvm
      - /dev/net/tun
    capabilities:
      - CAP_NET_ADMIN
    commands: /test.sh
    cores: 1
    start_delay: 5
    duration: 30
  results:
    - name: throughput
      path: /results/throughput.txt
      type: float
