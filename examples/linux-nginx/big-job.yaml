build:
  image: hlefeuvre/linux-nginx:latest
  outputs:
    kernel: /root/linux-nginx-qemu.kernel
    initrd: /root/nginx.ext2
    arch: x86_64
    plat: kvm
  devices:
    - /dev/urandom
  capabilities:
    - CAP_NET_ADMIN
  cores: 2
  commands:
    |
    set -ex
    env

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    # Build the image
    # TODO

    # Modify values inside the configuration
    # TODO

    # Generate ext4 image
    # TODO

    echo "Build Done!"

test:
  kernel:
    memory: 100M
    args: "root=/dev/vda rw console=ttyS0 init=/guest_start.sh $WAYFINDER_DOMAIN_IP_ADDR nginx"
    cores: 1
  benchtool:
    image: ghcr.io/unikraft/wayfinder/wrk:latest
    devices:
      - /dev/urandom
      - /dev/kvm
      - /dev/net/tun
    capabilities:
      - CAP_NET_ADMIN
    commands: /test.sh
    cores: 1
    start_delay: 5
    duration: 30
  results:
    - name: throughput
      path: /results/throughput.txt
      type: float
