name: unikraft-nginx-big
params:
  # Unikraft-specific:
  - name: LWIP_NUM_TCPCON
    description: |
      The number of simultaneous TCP connections.
    type: int
    default: 64
    only: [8, 16, 32, 64]
    when: build

  - name: LWIP_NUM_TCPLISTENERS
    description: |
      The number of simultaneous TCP listeners.
    type: int
    default: 64
    only: [8, 16, 32, 64]
    when: build

  - name: LWIP_UKNETDEV_POLLONLY
    description: |
      If enabled, the network interface will continuosly poll for new packets.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LWIP_POOLS
    description: |
      If enabled, the memory will be allocated in pools and used like that.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  # Platform options:
  # only necessary as long as unikraft does not support dynamic timer interrupt frequency.
  - name: HZ
    description: |
      The timer frequency.
    type: int
    default: 100
    only: [100, 250, 300, 1000]
    when: build

  # Allocator options:
  - name: ALLOCATOR
    description: |
      The allocator type to use inside the image.
    type: string
    default: "bbuddy"
    only: ["bbuddy", "poolalloc", "regalloc", "tinyalloc", "mimalloc", "tlsf"]
    when: build

  - name: LIBTINYALLOC_DISABLE_SPLIT
    description: |
      Disable the splitting of memory.
    type: string
    default: "n"
    only: ["n", "y"]
    if: ALLOCATOR=='tinyalloc'
    when: build

  - name: LIBTINYALLOC_SPLIT_THRESH
    description: |
      The threshold at which to split the memory
    type: int
    default: 16
    only: [8, 16, 24, 32]
    if: ALLOCATOR=='tinyalloc'
    when: build

  - name: LIBTINYALLOC_DISABLE_COMPACT
    description: |
      If enabled, it disables the compacting of memory.
    type: string
    default: "n"
    only: ["n", "y"]
    if: ALLOCATOR=='tinyalloc'
    when: build

  - name: LIBTINYALLOC_ALIGNMENT
    description: |
      The number to align the memory to.
    type: int
    default: 8
    only: [8, 16, 32, 64, 128]
    if: ALLOCATOR=='tinyalloc'
    when: build

  # Mimalloc options:
  - name: LIBMIMALLOC_MIMALLOC_DEBUG
    description: |
      The debug level of the allocator.
    type: int
    default: 0
    only: [0, 1, 2]
    if: ALLOCATOR=='mimalloc'
    when: build

  - name: LIBMIMALLOC_ASSERT
    description: |
      If assertions are to be evaluated.
    type: string
    default: "n"
    only: ["n", "y"]
    if: ALLOCATOR=='mimalloc'
    when: build

  # TLSF specific options:
  - name: LIBTLSF_TLSF_LOG2_SLI
    description: |
      Option to allocate memory based upon.
    type: int
    default: 5
    only: [4, 5, 6, 7]
    if: ALLOCATOR=='tlsf'
    when: build

  # LWIP options:
  - name: LWIP_TCP_QUEUE_OOSEQ
    description: |
      TCP will queue segments that arrive out of order.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LWIP_TCPIP_THREAD_STACKSIZE
    description: |
      The size of the stack for each TCP thread.
    type: int
    default: 0
    only: [0, 256, 512, 1024, 2048, 4096, 8192, 16384]
    when: build

  - name: LWIP_TCP_SND_BUF
    description: |
      The send buffer size.
    type: int
    default: 1048576
    only: [1048576, 256000, 524288, 1048576, 1572864, 2097152]
    when: build

  - name: LWIP_DNS_MAX_SERVERS
    description: |
      Number of DNS servers to have space for.
    type: int
    default: 2
    only: [1, 2, 5, 10]
    when: build

  - name: LWIP_DNS_LOCAL_HOST_LIST
    description: |
      Use localhost list for DNS.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC
    description: |
      If the list on localhost is dynamic.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LIBUKDEBUG_TRACEPOINTS
    description: |
      If enabled, tracepoints are activated.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LIBUKDEBUG_ALL_TRACEPOINTS
    description: |
      If enabled, no tracepoints are missed.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: LWIP_POOLS_TRY_BIGGER_POOL
    description: |
      If enabled, lwip will try to increase the size of the pools.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: MEMP_USE_CUSTOM_POOLS
    description: |
      If enabled, lwip will not use standard pools.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  # Nginx-specific
  - name: ACCESS_LOG
    description: |
      If enabled, logs will be kept for nginx.
    type: string
    default: "n"
    only: ["y", "n"]
    when: build

  - name: KEEPALIVE_TIMEOUT
    description: |
      The time to wait for a connection until dropping it.
    type: int
    default: 60
    only: [0, 30, 60, 300]
    when: build

  - name: OPEN_FILE_CACHE
    description: |
      If enabled, nginx will cache the file content.
    type: string
    default: "nocaching"
    only: ["caching", "nocaching"]
    when: build

  - name: WORKER_RLIMIT_NOFILE
    description: |
      Changes the limit on the maximum number of open files.
    type: string
    only: [63, 126] # Should be double than WORKER_CONNECTIONS
    default: 63
    when: build

  - name: SERVER_TOKENS
    description: |
      If enabled, it will send te server token together with the response.
    type: string
    only: ["on", "off"]
    default: "off"
    when: build

  - name: SENDFILE
    description: |
      If enabled, it will use the sendfile function family from the kernel.
      Currently disabled for Unikraft, as it does not have support.
    type: string
    only: ["off"]
    default: "off"
    when: build

  - name: TCP_NOPUSH
    description: |
      If on, blocks the data until the packet reaches the MSS.
    type: string
    default: "off"
    only: ["on", "off"]
    when: build

  # Client-specific
  - name: WORKER_CONNECTIONS
    description: |
      The number of wrk connections.
    type: int
    default: 63
    only: [63]
    when: build

  - name: PAYLOAD_SIZE
    description: |
      The size of the payload in bytes.
    type: int
    default: 612
    only: [612] # bytes
    when: build

  - name: NUM_PARALLEL_CONNS
    description: |
      The number of simultaneous TCP connections.
    type: int
    default: 30
    only: [5, 10, 30, 64]
    when: test

build:
  image: ghcr.io/unikraft/wayfinder/unikraft-nginx:latest
  outputs:
    kernel: /usr/src/unikraft/apps/nginx/build/nginx_kvm-x86_64
    initrd: /usr/src/unikraft/apps/nginx/initramfs.cpio
    arch: x86_64
    plat: kvm
  devices:
    - /dev/urandom
  capabilities:
    - CAP_NET_ADMIN
  cores: 2
  commands: |
    set -ex
    env

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8
    export UK_CACHEDIR=/usr/src/unikraft/.kraftcache/
    export UK_WORKDIR=/usr/src/unikraft 

    cd /usr/src/unikraft/apps/nginx

    # Conditioned configurations to be given to kraft
    # LIBS    == libs to be configured
    # ENABLE  == used for enabling/disabling libs
    # OPTIONS == options for selected libs
    KRAFT_CONFIGURE_COND_LIBS=()
    KRAFT_CONFIGURE_COND_ENABLE=()
    KRAFT_CONFIGURE_COND_OPTIONS=()

    if [[ ${ALLOCATOR} == "tinyalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_ALIGNMENT=${LIBTINYALLOC_ALIGNMENT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_COMPACT=${LIBTINYALLOC_DISABLE_COMPACT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_SPLIT_THRESH=${LIBTINYALLOC_SPLIT_THRESH}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_SPLIT=${LIBTINYALLOC_DISABLE_SPLIT}")
    fi
    if [[ ${ALLOCATOR} == "bbuddy" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "poolalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "regalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "tinyalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_SPLIT=${LIBTINYALLOC_DISABLE_SPLIT}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u tinyalloc@0.7.0")
    fi
    if [[ ${ALLOCATOR} == "mimalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBMIMALLOC_ASSERT=${LIBMIMALLOC_ASSERT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBMIMALLOC_MIMALLOC_DEBUG=${LIBMIMALLOC_MIMALLOC_DEBUG}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u mimalloc@0.7.0")
    fi
    if [[ ${ALLOCATOR} == "tlsf" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTLSF_TLSF_LOG2_SLI=${LIBTLSF_TLSF_LOG2_SLI}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u tlsf@0.7.0")
    fi

    # Configure Image for Nginx
    kraft -v configure -F \
      -u unikraft@0.9.0 \
      -u lib/nginx@0.9.0 \
      -u app/nginx@0.6 \
      -u newlib@0.9.0 \
      -u pthread-embedded@0.9.0 \
      -u lwip@0.9.0 \
      ${KRAFT_CONFIGURE_COND_LIBS[@]} \
      --arch x86_64 \
      --plat kvm \
      --set HZ=$HZ \
      --set LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC=$LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC \
      --set LWIP_DNS_LOCAL_HOST_LIST=$LWIP_DNS_LOCAL_HOST_LIST \
      --set LWIP_DNS_MAX_SERVERS=$LWIP_DNS_MAX_SERVERS \
      --set LWIP_TCP_SND_BUF=$LWIP_TCP_SND_BUF \
      --set LWIP_TCPIP_THREAD_STACKSIZE=$LWIP_TCPIP_THREAD_STACKSIZE \
      --set LWIP_TCP_QUEUE_OOSEQ=$LWIP_TCP_QUEUE_OOSEQ \
      --set LIBUKDEBUG_TRACEPOINTS=$LIBUKDEBUG_TRACEPOINTS \
      --set LIBUKDEBUG_ALL_TRACEPOINTS=$LIBUKDEBUG_ALL_TRACEPOINTS \
      --set LWIP_POOLS_TRY_BIGGER_POOL=$LWIP_POOLS_TRY_BIGGER_POOL \
      --set MEMP_USE_CUSTOM_POOLS=$MEMP_USE_CUSTOM_POOLS \
      --set LWIP_NUM_TCPCON=$LWIP_NUM_TCPCON \
      --set LWIP_NUM_TCPLISTENERS=$LWIP_NUM_TCPLISTENERS \
      --set LWIP_UKNETDEV_POLLONLY=$LWIP_UKNETDEV_POLLONLY \
      --set LWIP_POOLS=$LWIP_POOLS \
      --set LIBDEVFS_DEV_STDOUT=$ACCESS_LOG \
      ${KRAFT_CONFIGURE_COND_OPTIONS[@]} \
      --yes LIBVFSCORE_ROOTFS_INITRD \
      --yes LIBCPIO \
      ${KRAFT_CONFIGURE_COND_ENABLE[@]} \
      --no  LIB9PFS \
      --no  LIBUK9P

    # Build the image
    kraft build --no-fetch --no-progress --fast

    # Modify values inside the configuration
    cat /nginx-$OPEN_FILE_CACHE.conf | sed "s/\$WORKER_CONNECTIONS/${WORKER_CONNECTIONS}/g" > ./fs0/nginx/conf/nginx.conf
    if [[ $ACCESS_LOG == "y" ]]; then \
     export ACCESS_LOG="\/dev\/stdout"; \
    else \
     export ACCESS_LOG="off"; \
    fi
    sed -i "s/\$ACCESS_LOG/${ACCESS_LOG}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$KEEPALIVE_TIMEOUT/${KEEPALIVE_TIMEOUT}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$WORKER_RLIMIT_NOFILE/${WORKER_RLIMIT_NOFILE}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$SERVER_TOKENS/${SERVER_TOKENS}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$SENDFILE/${SENDFILE}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$TCP_NOPUSH/${TCP_NOPUSH}/g" ./fs0/nginx/conf/nginx.conf

    cat ./fs0/nginx/conf/nginx.conf

    # Generate cpio image
    cd fs0/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > ./nginx/html/payload.txt
    find -depth -print | tac | bsdcpio -o --format newc > ../initramfs.cpio

    echo "Build Done!"

test:
  - name: throughput
    kernel:
      memory: 20M
      args: netdev.ipv4_addr=$WAYFINDER_DOMAIN_IP_ADDR netdev.ipv4_gw_addr=$WAYFINDER_DOMAIN_IP_GW_ADDR netdev.ipv4_subnet_mask=$WAYFINDER_DOMAIN_IP_MASK --
      cores: 1
    benchtool:
      image: ghcr.io/unikraft/wayfinder/wrk:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: /test.sh
      monitors:
        - name: power
          commands: ./scripts/power-monitor.sh http://192.168.0.225/meter/0
      cores: 1
      start_delay: 5
      duration: 30
    results:
      - name: throughput
        path: /results/throughput.txt
        type: float
