params:
  # Unikraft-specific
  - name: LWIP_NUM_TCPCON
    type: int
    only: [64]

  - name: LWIP_NUM_TCPLISTENERS
    type: int
    only: [64]

  - name: LWIP_UKNETDEV_POLLONLY
    type: string
    only: ["y"]

  - name: LWIP_POOLS
    type: string
    only: ["y"]

  #! - name: LWIP_POOLS_TRY_BIGGER_POOL
  #!   type: string
  #!   only: ["y", "n"]

  #! - name: MEMP_USE_CUSTOM_POOLS
  #!   type: string
  #!   only: ["y", "n"]

  # Nginx-specific
  - name: ACCESS_LOG
    type: string
    only: ["n"]

  - name: KEEPALIVE_TIMEOUT
    type: int
    only: [60]

  - name: OPEN_FILE_CACHE
    type: string
    only: ["caching"]

  # Client-specific
  - name: WORKER_CONNECTIONS
    type: int
    only: [63]

  - name: PAYLOAD_SIZE
    type: int
    only: [612] # bytes

  - name: NUM_PARALLEL_CONNS
    type: int
    only: [30]

build:
  image: localhost:5002/wayfinder/unikraft:latest
  cores: 1
  outputs:
    kernel: /usr/src/unikraft/apps/nginx/build/nginx_kvm-x86_64
    initrd: /usr/src/unikraft/apps/nginx/initramfs.cpio
    arch: x86_64
    plat: kvm
  devices:
    - /dev/urandom
  commands:
    |
    set -ex
    export UK_WORKDIR=/usr/src/unikraft
    export KRAFTRC=/usr/src/unikraft/.kraftrc
    export UK_CACHEDIR=/usr/src/unikraft/.kraftcache/

    export UK_KRAFT_GITHUB_TOKEN=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
    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8
    for env in $(cat /etc/environment); do \
      export $(echo $env | sed -e 's/"//g'); \
    done

    cd /usr/src/unikraft/apps/nginx
    rm /usr/src/unikraft/apps/nginx/.config

    UK_WORKDIR=/usr/src/unikraft UK_CACHEDIR=/usr/src/unikraft/.kraftcache/ kraft -v configure \
      --arch x86_64 \
      --plat kvm \
      --set LWIP_NUM_TCPCON=$LWIP_NUM_TCPCON \
      --set LWIP_NUM_TCPLISTENERS=$LWIP_NUM_TCPLISTENERS \
      --set LWIP_UKNETDEV_POLLONLY=$LWIP_UKNETDEV_POLLONLY \
      --set LWIP_POOLS=$LWIP_POOLS \
      --set LIBDEVFS_DEV_STDOUT=$ACCESS_LOG \
      --yes LIBVFSCORE_ROOTFS_RAMFS \
      --yes LIBINITRAMFS \
      --yes LIBCPIO \
      --no  LIB9PFS \
      --no  LIBUK9P

    kraft build
    cat /nginx-$OPEN_FILE_CACHE.conf | sed "s/\$WORKER_CONNECTIONS/${WORKER_CONNECTIONS}/g" > ./fs0/nginx/conf/nginx.conf
    if [[ $ACCESS_LOG == "y" ]]; then \
      export ACCESS_LOG="\/dev\/stdout"; \
    else \
      export ACCESS_LOG="off"; \
    fi
    sed -i "s/\$ACCESS_LOG/${ACCESS_LOG}/g" ./fs0/nginx/conf/nginx.conf
    sed -i "s/\$KEEPALIVE_TIMEOUT/${KEEPALIVE_TIMEOUT}/g" ./fs0/nginx/conf/nginx.conf

    cat ./fs0/nginx/conf/nginx.conf

    # Generate cpio image
    cd fs0/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > ./nginx/html/payload.txt
    find -depth -print | tac | bsdcpio -o --format newc > ../initramfs.cpio

test:
  kernel:
    memory: 10M
    args: netdev.ipv4_addr=$WAYFINDER_DOMAIN_IP_ADDR netdev.ipv4_gw_addr=$WAYFINDER_DOMAIN_IP_SUBNET netdev.ipv4_subnet_mask=$WAYFINDER_DOMAIN_IP_MASK --
    cores: 1
  benchtool:
    image: ghcr.io/lancs-net/wayfinder/wrk:latest
    devices:
      - /dev/urandom
    capabilities:
      - CAP_NET_ADMIN
    commands: /test.sh
    cores: 1
    start_delay: 5
  results:
    - name: throughput
      path: /results/throughput.txt
      type: float
