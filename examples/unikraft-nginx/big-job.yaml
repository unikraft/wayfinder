# Not done

params:
  # Unikraft-specific
  - name: LWIP_NUM_TCPCON
    type: int
    only: [8, 16, 32, 64]

  - name: LWIP_NUM_TCPLISTENERS
    type: int
    only: [8, 16, 32, 64]
  
  - name: LWIP_UKNETDEV_POLLONLY
    type: string
    only: ["y", "n"]
  
  - name: LWIP_POOLS
    type: string
    only: ["y", "n"]

  # Platform options:

  # only necessary as long as unikraft does not support dynamic timer interrupt frequency.
  - name: HZ
    type: int
    only: [100, 250, 300, 1000]

  # Allocator options:
  - name: ALLOCATOR
    type: string
    only: ["tinyalloc", "bbuddy", "poolalloc", "regalloc", "tinyalloc", "mimalloc", "tlsf", "none"]

  - name: LIBTINYALLOC_DISABLE_SPLIT
    when: "tinyalloc"
    type: string
    only: ["n", "y"]

  - name: LIBTINYALLOC_SPLIT_THRESH
    when: "n"
    type: int
    only: [8, 16, 24, 32]

  - name: LIBTINYALLOC_DISABLE_COMPACT
    when: "tinyalloc"
    type: string
    only: ["n", "y"]

  - name: LIBTINYALLOC_ALIGNMENT
    when: "tinyalloc"
    type: int
    only: [8, 16, 32, 64, 128]
  
  # Mimalloc options:
  - name: LIBMIMALLOC_MIMALLOC_DEBUG
    when: "mimalloc"
    type: int
    only: [0, 1, 2]

  - name: LIBMIMALLOC_ASSERT
    when: "mimalloc"
    type: string
    only: ["n", "y"]

  # TLSF specific options:
  - name: LIBTLSF_TLSF_LOG2_SLI
    when: "tlsf"
    type: int
    only: [4, 5, 6, 7]

  # LWIP options:
  - name: LWIP_TCP_QUEUE_OOSEQ
    type: string
    only: ["y", "n"]

  - name: LWIP_TCPIP_THREAD_STACKSIZE
    type: int
    only: [0, 256, 512, 1024, 2048, 4096, 8192, 16384]

  - name: LWIP_TCP_SND_BUF
    type: int
    only: [1048576, 256000, 524288, 1048576, 1572864, 2097152]
  
  - name: LWIP_DNS_MAX_SERVERS
    type: int
    only: [1, 2, 5, 10]

  - name: LWIP_DNS_LOCAL_HOST_LIST
    type: string
    only: ["y", "n"]

  - name: LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC
    type: string
    only: ["y", "n"]

  # Tracepoint options:
  - name: LIBUKDEBUG
    type: string
    only: ["y", "n"]
    params:

  - name: LIBUKDEBUG_TRACEPOINTS
    when: "y"
    type: string
    only: ["y", "n"]

  - name: LIBUKDEBUG_ALL_TRACEPOINTS
    when: "y"
    type: string
    only: ["y", "n"]

  - name: LWIP_POOLS_TRY_BIGGER_POOL
    type: string
    only: ["y", "n"]

  - name: MEMP_USE_CUSTOM_POOLS
    type: string
    only: ["y", "n"]

  # Nginx-specific
  - name: ACCESS_LOG
    type: string
    only: ["y", "n"]

  - name: KEEPALIVE_TIMEOUT
    type: int
    only: [0, 30, 60, 300]

  - name: OPEN_FILE_CACHE
    type: string
    only: ["caching", "nocaching"]

  # Client-specific
  - name: WORKER_CONNECTIONS
    type: int
    only: [63]

  - name: PAYLOAD_SIZE
    type: int
    only: [612] # bytes
  
  - name: NUM_PARALLEL_CONNS
    type: int
    only: [5, 10, 30, 64]
