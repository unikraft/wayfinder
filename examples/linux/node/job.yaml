    when: test

  # This is only relevant if you perform some form of priority queueing.
  - name: DEFAULT_QDISC
    type: string
    default: "pfifo_fast"
    only: ["pfifo", "bfifo", "pfifo_fast", "red", "sfq", "tbf"]
    when: test

  #  maximum number of packets that kernel can handle on a NAPI interrupt
  - name: DEV_WEIGHT
    type: int
    min: 0
    max: 640000000
    default: 64
    only: [64]
    when: test

  # These option requires rps to be enabled on option
  # /sys/class/net/<dev>/queues/rx-<n>/rps_cpus also it doesn't make much sense
  # if single core (spreads interrupt management to multiple CPUs])
  # if testing multicre worth checking: XPS (Transmit packet steering),
  # RFS (Receive Flow Steering)
  - name: FLOW_LIMIT_CPU_BITMAP
    type: string
    default: "00"
    only: ["00"]
    when: test

  - name: FLOW_LIMIT_TABLE_LEN
    type: int
    min: 4090
    max: 4096
    default: 4096
    only: [4096]
    when: test

