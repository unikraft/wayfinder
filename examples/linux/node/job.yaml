build:
  image: ghcr.io/unikraft/wayfinder/linux-node:latest
  outputs:
    kernel: /root/workspace/kernelbuild/microvm++node/vmlinuz-4.0.0+
    disks:
      - name: vda
        type: raw
        path: /root/workspace/node.ext3
  devices:
    - /dev/urandom
    - /dev/loop-control
  capabilities:
    - CAP_NET_ADMIN
    - CAP_SYS_ADMIN
  cores: 6
  workdir: /root/workspace
  commands: |
    set -xe

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    # Configure Linux
    echo "Configuring Linux"
    set-kernel-build.sh

    # Build the image
    echo "Building the image"
    ./scripts/build-with-configs.sh patch ${MICROVM_CFG} ${NODE_CFG}

    # Generate filesystem image
    echo "Generating filesystem image"
    image2rootfs.sh node.tar ext3 1024M
    mkdir -p /tmp/node-ext3
    mount -o loop ./node.ext3 /tmp/node-ext3

    # Install runtime option and network setup script here 
    # as we cannot run `u`/`mount` during the container's build.
    cp -v ./scripts/set-kernel-runtime.sh /tmp/node-ext3
    cp -v ./scripts/set-node-options.sh /tmp/node-ext3
    cp -v ./scripts/busybox-x86_64 /tmp/node-ext3
    cp -v ./scripts/guest* /tmp/node-ext3
    cp -v ./load_entropy/load_entropy /tmp/node-ext3

    # Install musl libc
    mkdir -p /tmp/node-ext3/trusted
    cp -v ./scripts/libc.so /tmp/node-ext3/trusted/libc.so

    # Copy the node benchmark
    mkdir -p /tmp/node-ext3/bench
    tar -xzf ./bench.tar.gz -C /tmp/node-ext3/bench

    # Unmounting seals the filesystem archive
    umount /tmp/node-ext3

    echo "Build Done!"

