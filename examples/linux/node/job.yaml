    max: 1000000000
    default: 10
    only: [10]
    when: test

  - name: MESSAGE_COST
    type: int
    min: 0
    max: 5000000000
    default: 5
    only: [5]
    when: test

  # threshold of packet processed on every NAPI poll cycle (Probably interesting,
  # although since backpressure will occur naturally, not that important)
  - name: NETDEV_BUDGET
    type: int
