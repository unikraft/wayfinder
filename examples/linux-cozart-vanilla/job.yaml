  - name:    PAYLOAD_SIZE
    type:    int
    only:    [612] # bytes
    when:    test

build:
  image: localhost:5000/linux-cozart-nginx:latest
  outputs:
    kernel: /root/workspace/linux/arch/x86/boot/bzImage
    disks:
      - name: vda
        type: raw
        path: /root/workspace/nginx.ext3
  devices:
    - /dev/urandom
    - /dev/loop-control
  capabilities:
    - CAP_NET_ADMIN
    - CAP_SYS_ADMIN
  cores: 44
  workdir: /root/workspace/linux
  commands:
    |
    set -xe

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    env

    echo "Configuring Linux"
    #
    # 1. Configure Linux
    #
    cd ${WORKDIR}/linux

    set +x
    for var in $(env | grep ^CONFIG_ | cut -d= -f1); do
      if [ -n "${!var}" ]; then
        echo "${var}=${!var}" >> permutation.config
      fi
    done
    set -x

    KCONFIG_ALLCONFIG=permutation.config make allnoconfig

    echo "Building kernel"
    make -j$(nproc)

    echo "Generating filesystem image"
    #
    # 2. Generate filesystem image
    #
    cd ${WORKDIR}
    image2rootfs.sh ./nginx.tar ext3
    mkdir -p /tmp/nginx-ext3
    mount -o loop ./nginx.ext3 /tmp/nginx-ext3

    # Install network setup script here as we cannot run `u`/`mount` during the
    # container's build.
    cp -v /root/workspace/lupine-linux/scripts/busybox-x86_64 /tmp/nginx-ext3
    cp -v /root/workspace/lupine-linux/scripts/guest* /tmp/nginx-ext3

    # Install musl libc
    mkdir -p /tmp/nginx-ext3/trusted
    cp -v /root/workspace/lupine-linux/scripts/libc.so /tmp/nginx-ext3/trusted/libc.so

    # Generate a variable-size payload
    mkdir -p /tmp/nginx-ext3/data/www/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > /tmp/nginx-ext3/data/www/index.html

    # Unmounting seals the filesystem archive
    umount /tmp/nginx-ext3

    echo "Build Done!"

test:
  - name: throughput
    kernel:
      plat: kvm
      arch: x86_64
      memory: 512M
      args:
        >
        raid=noautodetect
        root=/dev/vda
        rw
        WAYFINDER_DOMAIN_IP_ADDR=$WAYFINDER_DOMAIN_IP_ADDR
        WAYFINDER_DOMAIN_IP_GW_ADDR=$WAYFINDER_DOMAIN_IP_GW_ADDR
        console=ttyS0
        KEEPALIVE_TIMEOUT=${KEEPALIVE_TIMEOUT}
        OPEN_FILE_CACHE=${OPEN_FILE_CACHE}
        WORKER_RLIMIT_NOFILE=${WORKER_RLIMIT_NOFILE}
        SERVER_TOKENS=${SERVER_TOKENS}
        SENDFILE=${SENDFILE}
        TCP_NOPUSH=${TCP_NOPUSH}
        WORKER_CONNECTIONS=${WORKER_CONNECTIONS}
        PAYLOAD_SIZE=${PAYLOAD_SIZE}
        init=/guest_start.sh
      cores: 8
    benchtool:
      image: localhost:5000/wrk:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: /test.sh index.html
      cores: 1
      start_delay: 15
      duration: 1
    results:
      - name: throughput
        path: /results/throughput.txt
        type: float
