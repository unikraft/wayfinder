build:
  image: localhost:5000/linux-cozart-nginx-optimized:latest
  outputs:
    kernel: /root/workspace/linux/arch/x86/boot/bzImage
    disks:
      - name: vda
        type: raw
        path: /root/workspace/nginx.ext3
  devices:
    - /dev/urandom
    - /dev/loop-control
  capabilities:
    - CAP_NET_ADMIN
    - CAP_SYS_ADMIN
  cores: 44
  workdir: /root/workspace/linux
  commands:
    |
    set -xe

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    env

    echo "Configuring Linux"
    #
    # 1. Configure Linux
    #
    cd ${WORKDIR}/linux

    set +x
    for var in $(env | grep ^CONFIG_ | cut -d= -f1); do
      if [ -n "${!var}" ]; then
        echo "${var}=${!var}" >> permutation.config
      fi
    done
    set -x

    KCONFIG_ALLCONFIG=permutation.config make allnoconfig

    echo "Building kernel"
    make -j$(nproc)

    echo "Generating filesystem image"
    #
    # 2. Generate filesystem image
    #
    cd ${WORKDIR}
    image2rootfs.sh ./nginx.tar ext3
    mkdir -p /tmp/nginx-ext3
    mount -o loop ./nginx.ext3 /tmp/nginx-ext3

    # Install network setup script here as we cannot run `u`/`mount` during the
    # container's build.
    cp -v /root/workspace/lupine-linux/scripts/busybox-x86_64 /tmp/nginx-ext3
    cp -v /root/workspace/lupine-linux/scripts/guest* /tmp/nginx-ext3

    # Install musl libc
    mkdir -p /tmp/nginx-ext3/trusted
    cp -v /root/workspace/lupine-linux/scripts/libc.so /tmp/nginx-ext3/trusted/libc.so

    # Generate a variable-size payload
    mkdir -p /tmp/nginx-ext3/data/www/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > /tmp/nginx-ext3/data/www/index.html

    # Unmounting seals the filesystem archive
    umount /tmp/nginx-ext3

    echo "Build Done!"

