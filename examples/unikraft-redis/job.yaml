name: unikraft-redis
params:
  # Unikraft-specific:
  - name:    LWIP_NUM_TCPCON
    description: |
      The number of simultaneous TCP connections.
    type:    int
    default: 64
    only:    [8, 16, 32, 64]
    when:    build

  - name:    LWIP_NUM_TCPLISTENERS
    description: |
      The number of simultaneous TCP listeners.
    type:    int
    default: 64
    only:    [8, 16, 32, 64]
    when:    build
  
  - name:    LWIP_UKNETDEV_POLLONLY
    description: |
      If enabled, the network interface will continuosly poll for new packets.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build
  
  - name:    LWIP_POOLS
    description: |
      If enabled, the memory will be allocated in pools and used like that.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  # Platform options:
  # only necessary as long as unikraft does not support dynamic timer interrupt frequency.
  - name:    HZ
    description: |
      The timer frequency.
    type:    int
    default: 100
    only:    [100, 250, 300, 1000]
    when:    build

  # Allocator options:
  - name:    ALLOCATOR
    description: |
      The allocator type to use inside the image.
    type:    string
    default: "bbuddy"
    only:    ["bbuddy", "poolalloc", "regalloc", "tinyalloc", "mimalloc", "tlsf"]
    when:    build

  - name:    LIBTINYALLOC_DISABLE_SPLIT
    description: |
      Disable the splitting of memory.
    type:    string
    default: "n"
    only:    ["n", "y"]
    if:      ALLOCATOR=='tinyalloc'
    when:    build

  - name:    LIBTINYALLOC_SPLIT_THRESH
    description: |
      The threshold at which to split the memory
    type:    int
    default: 16
    only:    [8, 16, 24, 32]
    if:      ALLOCATOR=='tinyalloc'
    when:    build

  - name:    LIBTINYALLOC_DISABLE_COMPACT
    description: |
      If enabled, it disables the compacting of memory.
    type:    string
    default: "n"
    only:    ["n", "y"]
    if:      ALLOCATOR=='tinyalloc'
    when:    build

  - name:    LIBTINYALLOC_ALIGNMENT
    description: |
      The number to align the memory to.
    type:    int
    default: 8
    only:    [8, 16, 32, 64, 128]
    if:      ALLOCATOR=='tinyalloc'
    when:    build
  
  # Mimalloc options:
  - name:    LIBMIMALLOC_MIMALLOC_DEBUG
    description: |
      The debug level of the allocator.
    type:    int
    default: 0
    only:    [0, 1, 2]
    if:      ALLOCATOR=='mimalloc'
    when:    build

  - name:    LIBMIMALLOC_ASSERT
    description: |
      If assertions are to be evaluated.
    type:    string
    default: "n"
    only:    ["n", "y"]
    if:      ALLOCATOR=='mimalloc'
    when:    build

  # TLSF specific options:
  - name:    LIBTLSF_TLSF_LOG2_SLI
    description: |
      Option to allocate memory based upon.
    type:    int
    default: 5
    only:    [4, 5, 6, 7]
    if:      ALLOCATOR=='tlsf'
    when:    build

  # LWIP options:
  - name:    LWIP_TCP_QUEUE_OOSEQ
    description: |
      TCP will queue segments that arrive out of order.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    LWIP_TCPIP_THREAD_STACKSIZE
    description: |
      The size of the stack for each TCP thread.
    type:    int
    default: 0
    only:    [0, 256, 512, 1024, 2048, 4096, 8192, 16384]
    when:    build

  - name:    LWIP_TCP_SND_BUF
    description: |
      The send buffer size.
    type:    int
    default: 1048576 
    only:    [1048576, 256000, 524288, 1048576, 1572864, 2097152]
    when:    build
  
  - name:    LWIP_DNS_MAX_SERVERS
    description: |
      Number of DNS servers to have space for.
    type:    int
    default: 2
    only:    [1, 2, 5, 10]
    when:    build

  - name:    LWIP_DNS_LOCAL_HOST_LIST
    description: |
      Use localhost list for DNS.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC
    description: |
      If the list on localhost is dynamic.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    LIBUKDEBUG_TRACEPOINTS
    description: |
      If enabled, tracepoints are activated.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    LIBUKDEBUG_ALL_TRACEPOINTS
    description: |
      If enabled, no tracepoints are missed.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    LWIP_POOLS_TRY_BIGGER_POOL
    description: |
      If enabled, lwip will try to increase the size of the pools.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  - name:    MEMP_USE_CUSTOM_POOLS
    description: |
      If enabled, lwip will not use standard pools.
    type:    string
    default: "n"
    only:    ["y", "n"]
    when:    build

  # Redis-specific
  - name: REDIS_TCP_BACKLOG
    type: int
    min: 1
    max: 1024
    default: 512
    only: [512]
    when: build

  - name: REDIS_TIMEOUT
    type: int
    default: 0
    only: [0, 60]
    when: build

  - name: REDIS_KEEPALIVE
    type: int
    default: 0
    only: [0, 60]
    when: build

  - name: REDIS_DATABASES
    type: int
    min: 1
    max: 24
    default: 12
    only: [12]
    when: build

  - name: REDIS_SAVE_TIME
    type: int
    min: 1
    max: 2048
    default: 60
    when: build

  - name: REDIS_SAVE_RECORDS
    type: int
    min: 1
    max: 10000
    default: 10000
    only: [10000]
    when: build

  - name: REDIS_RBCOMRESSION
    type: string
    default: "yes"
    only: ["yes", "no"]
    when: build

  - name: REDIS_RDBCHECKSUM
    type: string
    default: "no"
    only: ["no", "yes"]
    when: build

  - name: REDIS_MAX_MEMORY_POLICY
    type: string
    default: "noeviction"
    only: ["noeviction", "volatile-lru", "allkeys-lru", "volatile-lfu", "allkeys-lfu", "volatile-random", "allkeys-random", "volatile-ttl"]
    when: build

  - name: REDIS_MAX_MEMORY_SAMPLE
    type: int
    default: 5
    only: [5, 3, 10]
    when: build

  - name: REDIS_APPENDONLY
    type: string
    default: "no"
    only: ["no"] # "yes" crashes unikraft because it uses fork
    when: build

  - name: REDIS_AOF
    type: string
    default: "everysec"
    only: ["no"] # "yes" is disabled anyways by REDIS_APPENDONLY
    when: build

  - name: REDIS_AOF_REWRITE
    type: string
    default: "no"
    only: ["no"] # "yes" is disabled anyways by REDIS_APPENDONLY
    when: build

  - name: REDIS_AOF_PERCENT
    type: int
    min: 0
    max: 100
    default: 100
    only: [100] # disabled by REDIS_APPENDONLY
    when: build

  - name: REDIS_AOF_SIZE
    type: int
    min: 8
    max: 512
    default: 64
    only: [64] # disabled by REDIS_APPENDONLY
    when: build

  - name: REDIS_SLOWLOG_LEN
    type: int
    min: 8
    max: 512
    default: 128
    only: [128]
    when: build

  - name: REDIS_HASH_ENTRIES
    type: int
    min: 32
    max: 1024
    default: 512
    only: [512]
    when: build

  - name: REDIS_HASH_VALUES
    type: int
    min: 16
    max: 128
    default: 64
    only: [64]
    when: build

  - name: REDIS_ZSET_ENTRIES
    type: int
    min: 32
    max: 1024
    default: 128
    only: [128]
    when: build

  - name: REDIS_ZSET_VALUES
    type: int
    min: 16
    max: 128
    default: 64
    only: [64]
    when: build

  - name: REDIS_LISTPACK_SIZE
    type: int
    default: -2
    only: [-2, -5, -4, -3, -1]
    when: build

  - name: REDIS_COMPRESS
    type: int
    default: 0
    only: [0, 1, 2, 3]
    when: build

  - name: REDIS_INTSET
    type: int
    min: 16
    max: 1024
    default: 512
    only: [512]
    when: build

  - name: REDIS_REHASHING
    type: string
    default: "yes"
    only: ["yes", "no"]
    when: build

  # - name: REDIS_DEFRAG # Crashes Unikraft
  #   type: string
  #   default: "yes"
  #   only: ["yes", "no"]
  #   when: build

  - name: REDIS_JEMALOC_THREAD
    type: string
    default: "yes"
    only: ["yes", "no"]
    when: build


build:
  image: ghcr.io/unikraft/wayfinder/unikraft-redis:latest
  outputs:
    kernel: /usr/src/unikraft/apps/redis/build/redis_kvm-x86_64
    initrd: /usr/src/unikraft/apps/redis/initramfs.cpio
    arch: x86_64
    plat: kvm
  devices:
    - /dev/urandom
  capabilities:
    - CAP_NET_ADMIN
  cores: 2
  commands:
    |
    set -ex
    env

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8
    export UK_CACHEDIR=/usr/src/unikraft/.kraftcache/
    export UK_WORKDIR=/usr/src/unikraft 

    cd /usr/src/unikraft/apps/redis

    # Conditioned configurations to be given to kraft
    # LIBS    == libs to be configured
    # ENABLE  == used for enabling/disabling libs
    # OPTIONS == options for selected libs
    KRAFT_CONFIGURE_COND_LIBS=()
    KRAFT_CONFIGURE_COND_ENABLE=()
    KRAFT_CONFIGURE_COND_OPTIONS=()

    if [[ ${ALLOCATOR} == "tinyalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_ALIGNMENT=${LIBTINYALLOC_ALIGNMENT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_COMPACT=${LIBTINYALLOC_DISABLE_COMPACT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_SPLIT_THRESH=${LIBTINYALLOC_SPLIT_THRESH}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_SPLIT=${LIBTINYALLOC_DISABLE_SPLIT}")
    fi
    if [[ ${ALLOCATOR} == "bbuddy" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "poolalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "regalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
    fi
    if [[ ${ALLOCATOR} == "tinyalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTINYALLOC_DISABLE_SPLIT=${LIBTINYALLOC_DISABLE_SPLIT}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u tinyalloc@0.9.0")
    fi
    if [[ ${ALLOCATOR} == "mimalloc" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBMIMALLOC_ASSERT=${LIBMIMALLOC_ASSERT}")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBMIMALLOC_MIMALLOC_DEBUG=${LIBMIMALLOC_MIMALLOC_DEBUG}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u mimalloc@0.9.0")
    fi
    if [[ ${ALLOCATOR} == "tlsf" ]]; then
      KRAFT_CONFIGURE_COND_ENABLE+=("--yes LIBTLSF")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCREGION")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCPOOL")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBUKALLOCBBUDDY")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBTINYALLOC")
      KRAFT_CONFIGURE_COND_ENABLE+=("--no LIBMIMALLOC")
      KRAFT_CONFIGURE_COND_OPTIONS+=("--set LIBTLSF_TLSF_LOG2_SLI=${LIBTLSF_TLSF_LOG2_SLI}")
      KRAFT_CONFIGURE_COND_LIBS+=("-u tlsf@0.9.0")
    fi

    # Configure Image for Redis
    kraft -v configure -F \
      -u unikraft@0.9.0 \
      -u lib/redis@0.9.0 \
      -u app/redis@0.9.0 \
      -u newlib@0.9.0 \
      -u pthread-embedded@0.9.0 \
      -u lwip@0.9.0 \
      ${KRAFT_CONFIGURE_COND_LIBS[@]} \
      --arch x86_64 \
      --plat kvm \
      --set UK_NAME="redis" \
      --set HZ=$HZ \
      --set LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC=$LWIP_DNS_LOCAL_HOSTLIST_IS_DYNAMIC \
      --set LWIP_DNS_LOCAL_HOST_LIST=$LWIP_DNS_LOCAL_HOST_LIST \
      --set LWIP_DNS_MAX_SERVERS=$LWIP_DNS_MAX_SERVERS \
      --set LWIP_TCP_SND_BUF=$LWIP_TCP_SND_BUF \
      --set LWIP_TCPIP_THREAD_STACKSIZE=$LWIP_TCPIP_THREAD_STACKSIZE \
      --set LWIP_TCP_QUEUE_OOSEQ=$LWIP_TCP_QUEUE_OOSEQ \
      --set LIBUKDEBUG_TRACEPOINTS=$LIBUKDEBUG_TRACEPOINTS \
      --set LIBUKDEBUG_ALL_TRACEPOINTS=$LIBUKDEBUG_ALL_TRACEPOINTS \
      --set LWIP_POOLS_TRY_BIGGER_POOL=$LWIP_POOLS_TRY_BIGGER_POOL \
      --set MEMP_USE_CUSTOM_POOLS=$MEMP_USE_CUSTOM_POOLS \
      --set LWIP_NUM_TCPCON=$LWIP_NUM_TCPCON \
      --set LWIP_NUM_TCPLISTENERS=$LWIP_NUM_TCPLISTENERS \
      --set LWIP_UKNETDEV_POLLONLY=$LWIP_UKNETDEV_POLLONLY \
      --set LWIP_POOLS=$LWIP_POOLS \
      --set LIBDEVFS_DEV_STDOUT=$ACCESS_LOG \
      ${KRAFT_CONFIGURE_COND_OPTIONS[@]} \
      --yes LIBVFSCORE_ROOTFS_INITRD \
      --yes LIBCPIO \
      ${KRAFT_CONFIGURE_COND_ENABLE[@]} \
      --no  LIB9PFS \
      --no  LIBUK9P

    # Build the image
    kraft build --no-fetch --no-progress --fast

    mkdir ./fs0
    mkdir ./fs0/tmp

    sed  \
     -e "s/%REDIS_TCP_BACKLOG%/$REDIS_TCP_BACKLOG/g" \
     -e "s/%REDIS_TIMEOUT%/$REDIS_TIMEOUT/g" \
     -e "s/%REDIS_KEEPALIVE%/$REDIS_KEEPALIVE/g" \
     -e "s/%REDIS_DATABASES%/$REDIS_DATABASES/g" \
     -e "s/%REDIS_RBCOMRESSION%/$REDIS_RBCOMRESSION/g" \
     -e "s/%REDIS_RDBCHECKSUM%/$REDIS_RDBCHECKSUM/g" \
     -e "s/%REDIS_MAX_MEMORY_POLICY%/$REDIS_MAX_MEMORY_POLICY/g" \
     -e "s/%REDIS_MAX_MEMORY_SAMPLE%/$REDIS_MAX_MEMORY_SAMPLE/g" \
     -e "s/%REDIS_APPENDONLY%/$REDIS_APPENDONLY/g" \
     -e "s/%REDIS_AOF%/$REDIS_AOF/g" \
     -e "s/%REDIS_AOF_REWRITE%/$REDIS_AOF_REWRITE/g" \
     -e "s/%REDIS_AOF_PERCENT%/$REDIS_AOF_PERCENT/g" \
     -e "s/%REDIS_AOF_SIZE%/$REDIS_AOF_SIZE/g" \
     -e "s/%REDIS_SLOWLOG_LEN%/$REDIS_SLOWLOG_LEN/g" \
     -e "s/%REDIS_HASH_ENTRIES%/$REDIS_HASH_ENTRIES/g" \
     -e "s/%REDIS_HASH_VALUES%/$REDIS_HASH_VALUES/g" \
     -e "s/%REDIS_ZSET_ENTRIES%/$REDIS_ZSET_ENTRIES/g" \
     -e "s/%REDIS_ZSET_VALUES%/$REDIS_ZSET_VALUES/g" \
     -e "s/%REDIS_LISTPACK_SIZE%/$REDIS_LISTPACK_SIZE/g" \
     -e "s/%REDIS_COMPRESS%/$REDIS_COMPRESS/g" \
     -e "s/%REDIS_INTSET%/$REDIS_INTSET/g" \
     -e "s/%REDIS_REHASHING%/$REDIS_REHASHING/g" \
     -e "s/%REDIS_JEMALOC_THREAD%/$REDIS_JEMALOC_THREAD/g" \
    /redis-template.conf > ./fs0/redis.conf


    # Generate cpio image
    cd fs0/
    find -depth -print | tac | bsdcpio -o --format newc > ../initramfs.cpio

    echo "Build Done!"

test:
  - name: redis-all
    kernel:
      memory: 256M
      args: netdev.ipv4_addr=$WAYFINDER_DOMAIN_IP_ADDR netdev.ipv4_gw_addr=$WAYFINDER_DOMAIN_IP_GW_ADDR netdev.ipv4_subnet_mask=$WAYFINDER_DOMAIN_IP_MASK -- /redis.conf
      cores: 1
    benchtool:
      image: ghcr.io/unikraft/wayfinder/redis-benchtool:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: /test.sh
      monitors:
        - name: power
          commands: ./examples/unikraft-redis/power-monitor.sh http://192.168.0.225/meter/0
      cores: 1
      start_delay: 10
      duration: 30
    results:
      - name: throughput-get
        path: /results/get.txt
        type: float
      - name: throughput-set
        path: /results/set.txt
        type: float
      - name: throughput-lpush
        path: /results/lpush.txt
        type: float
      - name: throughput-lpop
        path: /results/lpop.txt
        type: float
