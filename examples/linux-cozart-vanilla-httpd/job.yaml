  - name:    CONFIG_UCS2_STRING
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_FONT_SUPPORT
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_FONT_8x8
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_FONT_8x16
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_SG_POOL
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_ARCH_HAS_SG_CHAIN
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_ARCH_HAS_PMEM_API
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_ARCH_HAS_UACCESS_FLUSHCACHE
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_ARCH_HAS_UACCESS_MCSAFE
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  - name:    CONFIG_SBITMAP
    type:    string
    only:    ["y", "n"]
    default: "y"
    when:    build

  # httpd-specific
  # https://httpd.apache.org/docs/2.4/mod/core.html
  - name: CONTENT_DIGEST # ContentDigest
    type: string
    default: "Off"
    only: ["On", "Off"]
    when: test

  - name: ENABLE_MMAP # EnableMMAP
    type: string
    default: "On"
    only: ["On", "Off"]
    when: test

  - name: ENABLE_SEND_FILE # EnableSendfile
    type: string
    default: "Off"
    only: ["On", "Off"]
    when: test

  - name: EXTENDED_STATUS # ExtendedStatus
    type: string
    default: "Off"
    only: ["On", "Off"]
    when: test

  - name: FLUSH_MAX_PIPELINED # FlushMaxPipelined
    type: int
    min: 0
    max: 100
    default: 5
    only: [5]
    when: test

  - name: FLUSH_MAX_THRESHOLD # FlushMaxThreshold
    type: int
    min: 0
    max: 524288
    default: 65536
    only: [65536]
    when: test

  - name: KEEP_ALIVE # KeepAlive
    type: string
    default: "On"
    only: ["On", "Off"]
    when: test

  - name: KEEP_ALIVE_TIMEOUT # KeepAliveTimeout
    type: int
    min: 0
    max: 300
    default: 5
    only: [5]
    when: test

  - name: LIMIT_REQUEST_BODY # LimitRequestBody
    type: int
    min: 0
    max: 1073741824
    default: 1073741824
    only: [1073741824]
    when: test

  - name: LIMIT_REQUEST_FIELDS # LimitRequestFields
    type: int
    min: 0
    max: 100
    default: 200
    only: [100]
    when: test

  - name: LIMIT_REQUEST_FILED_SIZE # LimitRequestFieldSize
    type: int
    min: 0
    max: 16384
    default: 8190
    only: [8190]
    when: test

  - name: LIMIT_REQUEST_LINE # LimitRequestLine
    type: int
    min: 0
    max: 16384
    default: 8190
    only: [8190]
    when: test

  - name: LOG_LEVEL # LogLevel
    type: string
    default: "warn"
    only: ["trace7", "trace6", "trace5", "trace4", "trace3", "trace2", "trace1", "debug", "info", "notice", "warn", "error", "crit", "alert", "emerg"]
    when: test

  - name: MAX_KEEP_ALIVE_REQUESTS # MaxKeepAliveRequests
    type: int
    min: 0
    max: 1000
    default: 100
    only: [100]
    when: test

  - name: MAX_RANGE_OVERLAPS # MaxRangeOverlaps
    type: int
    min: 0
    max: 100
    default: 20
    only: [20]
    when: test

  - name: MAX_RANGE_REVERSALS # MaxRangeReversals
    type: int
    min: 0
    max: 100
    default: 20
    only: [20]
    when: test

  - name: MAX_RANGES # MaxRanges
    type: int
    min: 0
    max: 1000
    default: 200
    only: [200]
    when: test

  - name: MUTEX # Mutex
    type: string
    default: "default"
    only: ["posixsem", "sysvsem", "pthread", "default"]
    when: test

  - name: READ_BUFFER_SIZE # ReadBufferSize
    type: int
    min: 0
    max: 1048576
    default: 8192
    only: [8192]
    when: test

  - name: SERVER_TOKENS # ServerTokens
    type: string
    default: "Full"
    only: ["Full", "OS", "Prod", "Min", "Minor", "Major"]
    when: test

  - name: TIME_OUT # TimeOut
    type: int
    min: 0
    max: 300
    default: 60
    only: [60]
    when: test

build:
  image: localhost:5000/linux-httpd:latest
  outputs:
    kernel: /root/workspace/linux/arch/x86/boot/bzImage
    disks:
      - name: vda
        type: raw
        path: /root/workspace/httpd.ext3
  devices:
    - /dev/urandom
    - /dev/loop-control
  capabilities:
    - CAP_NET_ADMIN
    - CAP_SYS_ADMIN
  cores: 44
  workdir: /root/workspace/linux
  commands:
    |
    set -xe

    export LC_ALL=C.UTF-8
    export LANG=C.UTF-8

    env

    echo "Configuring Linux"
    #
    # 1. Configure Linux
    #
    cd ${WORKDIR}/linux

    set +x
    for var in $(env | grep ^CONFIG_ | cut -d= -f1); do
      if [ -n "${!var}" ]; then
        echo "${var}=${!var}" >> permutation.config
      fi
    done
    set -x

    KCONFIG_ALLCONFIG=permutation.config make allnoconfig

    echo "Building kernel"
    make -j$(nproc)

    echo "Generating filesystem image"
    #
    # 2. Generate filesystem image
    #
    image2rootfs.sh httpd.tar
    mkdir -p /tmp/httpd-ext3
    mount -o loop ./httpd.ext3 /tmp/httpd-ext3

    # Install network setup script here as we cannot run `u`/`mount` during the
    # container's build.
    cp -v ./scripts/busybox-x86_64 /tmp/httpd-ext3
    cp -v ./scripts/guest* /tmp/httpd-ext3
    cp -v ./load_entropy/load_entropy /tmp/httpd-ext3

    # Install musl libc
    mkdir -p /tmp/httpd-ext3/trusted
    cp -v ./scripts/libc.so /tmp/httpd-ext3/trusted/libc.so

    # Generate a variable-size payload
    mkdir -p /tmp/httpd-ext3/data/www/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > /tmp/httpd-ext3/data/www/index.html

    # Unmounting seals the filesystem archive
    umount /tmp/httpd-ext3

    echo "Build Done!"

test:
  - name: throughput
    kernel:
      plat: kvm
      arch: x86_64
      memory: 1024M
      args:
        >
        raid=noautodetect
        root=/dev/vda
        rw
        WAYFINDER_DOMAIN_IP_ADDR=$WAYFINDER_DOMAIN_IP_ADDR
        WAYFINDER_DOMAIN_IP_GW_ADDR=$WAYFINDER_DOMAIN_IP_GW_ADDR
        console=ttyS0
        CONTENT_DIGEST=${CONTENT_DIGEST}
        ENABLE_MMAP=${ENABLE_MMAP}
        ENABLE_SEND_FILE=${ENABLE_SEND_FILE}
        EXTENDED_STATUS=${EXTENDED_STATUS}
        FLUSH_MAX_PIPELINED=${FLUSH_MAX_PIPELINED}
        FLUSH_MAX_THRESHOLD=${FLUSH_MAX_THRESHOLD}
        KEEP_ALIVE=${KEEP_ALIVE}
        KEEP_ALIVE_TIMEOUT=${KEEP_ALIVE_TIMEOUT}
        LIMIT_REQUEST_BODY=${LIMIT_REQUEST_BODY}
        LIMIT_REQUEST_FIELDS=${LIMIT_REQUEST_FIELDS}
        LIMIT_REQUEST_FILED_SIZE=${LIMIT_REQUEST_FILED_SIZE}
        LIMIT_REQUEST_LINE=${LIMIT_REQUEST_LINE}
        LOG_LEVEL=${LOG_LEVEL}
        MAX_KEEP_ALIVE_REQUESTS=${MAX_KEEP_ALIVE_REQUESTS}
        MAX_RANGE_OVERLAPS=${MAX_RANGE_OVERLAPS}
        MAX_RANGE_REVERSALS=${MAX_RANGE_REVERSALS}
        MAX_RANGES=${MAX_RANGES}
        MUTEX=${MUTEX}
        READ_BUFFER_SIZE=${READ_BUFFER_SIZE}
        SERVER_TOKENS=${SERVER_TOKENS}
        TIME_OUT=${TIME_OUT}
        init=/guest_start.sh
      cores: 4
    benchtool:
      image: localhost:5000/wrk:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: /test.sh index.html
      cores: 1
      start_delay: 15
      duration: 30
    results:
      - name: throughput
        path: /results/throughput.txt
        type: float
