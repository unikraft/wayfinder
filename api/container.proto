syntax = "proto3";

package wayfinder;

option go_package = "github.com/unikraft/wayfinder/api/proto";

enum ContainerState {
  CONTAINER_STATE_INIT    = 0;
  CONTAINER_STATE_RUNNING = 1;
  CONTAINER_STATE_PAUSED  = 2;
  CONTAINER_STATE_EXITED  = 3;
}

message ContainerEnvVar {
  string key   = 1;
  string value = 2;
}

message Container {
  string id            = 1;
  string image         = 2;
  ContainerState state = 3;
}

message CreateContainerRequest {
  string          image        = 1 [json_name = "image"];
  string          id           = 2 [json_name = "id"];
  repeated string devices      = 3 [json_name = "devices"];
  repeated string capabilities = 4 [json_name = "capabilities"];
  repeated int64  cores        = 5 [json_name = "cores"];
  repeated string environment  = 6 [json_name = "environment"];
  string          commands     = 7 [json_name = "commands"];
}

message CreateContainerResponse {
  bool  success = 1;
}
