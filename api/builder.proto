syntax = "proto3";

package wayfinder;

import "google/api/annotations.proto";

option go_package = "github.com/unikraft/wayfinder/api/proto";

// The builder service definition.
service BuilderService {

  // create build
  rpc CreateBuild (CreateBuildRequest) returns (CreateBuildResponse)  {
    option (google.api.http) = {
      put: "/api/job/{jobId}/permutation/{permutationId}/build",
    };
  }

  // start build
  rpc StartBuild (StartBuildRequest) returns (StartBuildResponse)  {
    option (google.api.http) = {
      put: "/api/job/{jobId}/permutation/{permutationId}/build/start",
    };
  }

  // get the build status
  rpc GetBuildStatus (GetBuildStatusRequest) returns (GetBuildStatusResponse)  {
    option (google.api.http) = {
      get: "/api/job/{jobId}/permutation/{permutationId}/build/status",
    };
  }

  // get the build status
  rpc SaveBuildOutputsToDisk (SaveBuildOutputsToDiskRequest) returns (SaveBuildOutputsToDiskResponse)  {
    option (google.api.http) = {
      post: "/api/job/{jobId}/permutation/{permutationId}/build/save",
    };
  }

  // destroy the build
  rpc DestroyBuild (DestroyBuildRequest) returns (DestroyBuildResponse)  {
    option (google.api.http) = {
      post: "/api/job/{jobId}/permutation/{permutationId}/destroy",
    };
  }
}

message BuildOutputs {
  string kernel = 1 [json_name = "kernel"];
  string initRd = 2 [json_name = "initrd"];
}

message BuildEnvVar {
  string name  = 1;
  string value = 2;
}

enum BuildStatus {
  BUILD_CREATED = 0;
  BUILD_RUNNING = 1;
  BUILD_PAUSED  = 2;
  BUILD_SUCCESS = 3;
  BUILD_KILLED  = 4;
  BUILD_FAILED  = 5;
}

message CreateBuildRequest {
  int64                jobId         = 1 [json_name = "job_id"];
  int64                permutationId = 2 [json_name = "permutation_id"];
  string               image         = 3 [json_name = "image"];
  repeated BuildEnvVar envVars       = 4 [json_name = "envvars"];
  repeated string      devices       = 5 [json_name = "devices"];
  repeated string      capabilities  = 6 [json_name = "capabilities"];
  repeated uint64      cores         = 7 [json_name = "cores"];
  string               commands      = 8 [json_name = "commands"];
}

message CreateBuildResponse {
  bool   success     = 1 [json_name = "success"];
  string uuid        = 2 [json_name = "uuid"];
}

message StartBuildRequest {
  string uuid         = 1 [json_name = "uuid"];
  int64 jobId         = 2 [json_name = "job_id"];
  int64 permutationId = 3 [json_name = "permutation_id"];
}

message StartBuildResponse {
  bool   success = 1 [json_name = "success"];
}

message GetBuildStatusRequest {
  string uuid         = 1 [json_name = "uuid"];
  int64 jobId         = 2 [json_name = "job_id"];
  int64 permutationId = 3 [json_name = "permutation_id"];
}

message GetBuildStatusResponse {
  bool        success = 1 [json_name = "success"];
  BuildStatus status  = 2 [json_name = "status"];
  string      runtime = 3 [json_name = "runtime"];
}

message SaveBuildOutputsToDiskRequest {
  string       uuid          = 1 [json_name = "uuid"];
  int64        jobId         = 2 [json_name = "job_id"];
  int64        permutationId = 3 [json_name = "permutation_id"];
  BuildOutputs outputs       = 4 [json_name = "outputs"];
}

message SaveBuildOutputsToDiskResponse {
  bool         success = 1 [json_name = "success"];
  BuildOutputs outputs = 2 [json_name = "outputs"];
}

message DestroyBuildRequest {
  string uuid         = 1 [json_name = "uuid"];
  int64 jobId         = 2 [json_name = "job_id"];
  int64 permutationId = 3 [json_name = "permutation_id"];
}

message DestroyBuildResponse {
  bool success = 1 [json_name = "success"];
}
