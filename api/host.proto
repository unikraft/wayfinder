syntax = "proto3";

package wayfinder;

import "google/api/annotations.proto";

option go_package = "github.com/unikraft/wayfinder/api/proto";

// The host configurator service definition.
service HostConfigService {

  // create host
  rpc CreateHost (CreateHostRequest) returns (CreateHostResponse)  {
    option (google.api.http) = {
      put: "/api/host",
    };
  }
}

message Host {
  int64  id                   = 1;
  string dmiUUID              = 2;
	string hostname             = 3;
	string architecture         = 4;
	string byteOrder            = 5;
	string addressSizesPhysical = 6;
	string addressSizesVirtual  = 7;
	int64  cPUs                 = 8;
	int64  threadsPerCore       = 9;
	int64  coresPerSocket       = 10;
	int64  sockets              = 11;
	int64  nUMAnodes            = 12;
	string vendorID             = 13;
	int64  cPUFamily            = 14;
	int64  model                = 15;
	string modelName            = 16;
	int64  stepping             = 17;
	float  cPUMHz               = 18;
	float  cPUMaxMHz            = 19;
	float  cPUMinMHz            = 20;
	float  bogoMIPS             = 21;
	string virtualization       = 22;
	string l1dCache             = 23;
	string l1iCache             = 24;
	string l2Cache              = 25;
	string l3Cache              = 26;
	string nUMANode0CPUs        = 27;
	string nUMANode1CPUs        = 28;
	string flags                = 29;
}

message CreateHostRequest {
  Host host = 1;
}

message CreateHostResponse {
  bool success = 1;
  int64 id = 2;
}
