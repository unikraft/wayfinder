syntax = "proto3";

package wayfinder;

import "google/api/annotations.proto";

option go_package = "github.com/unikraft/wayfinder/api/proto";

// The job service definition.
service JobService {

  // create job
  rpc CreateJob (CreateJobRequest) returns (CreateJobResponse)  {
    option (google.api.http) = {
      put: "/api/job",
    };
  }

  // start job
  rpc StartJob (StartJobRequest) returns (StartJobResponse)  {
    option (google.api.http) = {
      post: "/api/job/{id}/start",
    };
  }


  // list jobs
  rpc ListJobs (ListJobsRequest) returns (ListJobsResponse)  {
    option (google.api.http) = {
      get: "/api/jobs",
    };
  }

  // get a job
  rpc GetJob (GetJobRequest) returns (GetJobResponse)  {
    option (google.api.http) = {
      get: "/api/job/{id}",
    };
  }

  // get job results
  rpc GetJobResults (GetJobResultsRequest) returns (GetJobResultsResponse)  {
    option (google.api.http) = {
      get: "/api/job/{id}/results",
    };
  }
}

enum JobScheduler {
  JOB_SCHEDULER_GRID     = 0;
  JOB_SCHEDULER_RANDOM   = 1;
  JOB_SCHEDULER_BAYESIAN = 2;
}

enum JobIsolLevel {
  JOB_ISOL_LEVEL_NONE   = 0;
  JOB_ISOL_LEVEL_SOCKET = 1;
  JOB_ISOL_LEVEL_NUMA   = 2;
  JOB_ISOL_LEVEL_CACHE  = 3;
  JOB_ISOL_LEVEL_FULL   = 4;
}

enum JobIsolSplit {
  JOB_ISOL_SPLIT_BOTH   = 0;
  JOB_ISOL_SPLIT_BUILDS = 1;
  JOB_ISOL_SPLIT_TESTS  = 2;
}

enum JobStatus {
  JOB_STATUS_CREATED = 0;
  JOB_STATUS_RUNNING = 1;
  JOB_STATUS_PAUSED  = 2;
  JOB_STATUS_FAILED  = 3;
  JOB_STATUS_SUCCESS = 4;
}

enum JobPermutationStatus {
  JOB_PERM_STATUS_CREATED       = 0;
  JOB_PERM_STATUS_BUILD_INIT    = 1;
  JOB_PERM_STATUS_BUILD_RUNNING = 2;
  JOB_PERM_STATUS_BUILD_PAUSED  = 3;
  JOB_PERM_STATUS_BUILD_FAILED  = 4;
  JOB_PERM_STATUS_BUILD_KILLED  = 5;
  JOB_PERM_STATUS_TEST_INIT     = 6;
  JOB_PERM_STATUS_TEST_RUNNING  = 7;
  JOB_PERM_STATUS_TEST_PAUSED   = 8;
  JOB_PERM_STATUS_TEST_FAILED   = 9;
  JOB_PERM_STATUS_TEST_KILLED   = 10;
  JOB_PERM_STATUS_SUCCESS       = 11;
}

message Job {
  int64        id        = 1;
  JobScheduler scheduler = 2;
  JobIsolLevel isolLevel = 3;
  JobIsolSplit isolSplit = 4;
  JobStatus    status    = 5;
}

message CreateJobRequest {
  bytes data       = 1;
  bool  compressed = 2;
}

message CreateJobResponse {
  bool  success = 1;
  int64 id      = 2;
}

message StartJobRequest {
  int64        id               = 1;
  JobScheduler scheduler        = 2;
  JobIsolLevel isolLevel        = 3;
  JobIsolSplit isolSplit        = 4;
  int64        permutationLimit = 5;
  uint64       repeats          = 6;
}

message StartJobResponse {
  bool success = 1;
}

message ListJobsRequest {
  int64 offset = 1;
  int64 limit  = 2;
}

message ListJobsResponse {
  int64  count   = 1;
  bytes  data    = 2;
  bool   success = 3;
}

message GetJobRequest {
  int64 id = 1;
}

message GetJobResponse {
  bytes data    = 1;
  bool  success = 2;
}

message GetJobResultsRequest {
  int64 id = 1;
  int64 offset = 2;
  int64 limit  = 3;
}

message GetJobResultsResponse {
  bytes data    = 1;
  bool  success = 2;
}
