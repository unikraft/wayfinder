syntax = "proto3";

package wayfinder;

import "google/api/annotations.proto";

option go_package = "github.com/unikraft/wayfinder/api/proto";

// The tester service definition.
service TesterService {

  // create test
  rpc CreateTest (CreateTestRequest) returns (CreateTestResponse)  {
    option (google.api.http) = {
      put: "/api/job/{jobId}/permutation/{permutationId}/test",
    };
  }

  // start test
  rpc StartTest (StartTestRequest) returns (StartTestResponse)  {
    option (google.api.http) = {
      post: "/api/job/{jobId}/permutation/{permutationId}/test/start",
    };
  }

  // get the test status
  rpc GetTestStatus (GetTestStatusRequest) returns (GetTestStatusResponse)  {
    option (google.api.http) = {
      get: "/api/job/{jobId}/permutation/{permutationId}/test/status",
    };
  }

  // destroy the test
  rpc DestroyTest (DestroyTestRequest) returns (DestroyTestResponse)  {
    option (google.api.http) = {
      post: "/api/job/{jobId}/permutation/{permutationId}/test/destroy",
    };
  }
}

message TestEnvVar {
  string name  = 1 [json_name = "name"];
  string value = 2 [json_name = "value"];
}

enum TestStatus {
  TEST_CREATED          = 0;
  TEST_RUNNING          = 1;
  TEST_PAUSED           = 2;
  TEST_KILLED           = 3;
  TEST_KERNEL_FAILED    = 4;
  TEST_BENCHTOOL_FAILED = 5;
  TEST_SUCCESS          = 6;
}

enum TestResultType {
  TEST_RESULT_INT   = 0;
  TEST_RESULT_STR   = 1;
  TEST_RESULT_FLOAT = 2;
  TEST_RESULT_BOOL  = 3;
}

message TestKernel {
  string          memory    = 1 [json_name = "memory"];
  string          args      = 2 [json_name = "args"];
  repeated uint64 cores     = 3 [json_name = "cores"];
  string          image     = 4 [json_name = "image"];
  string          initRd    = 5 [json_name = "initrd"];
  string          arch      = 6 [json_name = "arch"];
  string          plat      = 7 [json_name = "plat"];
}

message TestBenchTool {
  string              image         = 1 [json_name = "image"];
  repeated TestEnvVar envVars       = 2 [json_name = "envvar"];
  repeated string     devices       = 3 [json_name = "devices"];
  repeated string     capabilities  = 4 [json_name = "capabilities"];
  repeated uint64     cores         = 5 [json_name = "cores"];
  string              commands      = 6 [json_name = "commands"];
  uint64              startDelay    = 7 [json_name = "start_delay"];
}

message TestResult {
  string name         = 1 [ json_name = "name" ];
  string path         = 2 [ json_name = "path" ];
  TestResultType type = 3 [ json_name = "type" ];
}

message CreateTestRequest {
  int64           jobId         = 1 [json_name = "job_id"];
  int64           permutationId = 2 [json_name = "permutation_id"];
  repeated uint64 vmmCores      = 3 [json_name = "vmm_cores"];
  TestKernel      kernel        = 4 [json_name = "kernel"];
  TestBenchTool   benchTool     = 5 [json_name = "benchtool"];
}

message CreateTestResponse {
  bool   success     = 1 [json_name = "success"];
  string uuid        = 2 [json_name = "uuid"];
}

message StartTestRequest {
  string uuid                 = 1 [json_name = "uuid"];
  int64 jobId                 = 2 [json_name = "job_id"];
  int64 permutationId         = 3 [json_name = "permutation_id"];
  repeated TestResult results = 4 [json_name = "results"];
}

message StartTestResponse {
  bool success = 1 [json_name = "success"];
}

message GetTestStatusRequest {
  string uuid         = 1 [json_name = "uuid"];
  int64 jobId         = 2 [json_name = "job_id"];
  int64 permutationId = 3 [json_name = "permutation_id"];
}

message GetTestStatusResponse {
  bool       success = 1 [json_name = "success"];
  TestStatus status  = 2 [json_name = "status"];
  string     runtime = 3 [json_name = "runtime"];
}

message DestroyTestRequest {
  string uuid         = 1 [json_name = "uuid"];
  int64 jobId         = 2 [json_name = "job_id"];
  int64 permutationId = 3 [json_name = "permutation_id"];
}

message DestroyTestResponse {
  bool success = 1 [json_name = "success"];
}
